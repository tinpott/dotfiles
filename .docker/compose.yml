services:
  dev:
    build: .
    image: dotfiles-dev
    container_name: dotfiles-dev
    restart: unless-stopped
    volumes:
      - ${HOME}/.ssh:/root/.ssh-host:ro
      - ${HOME}/.gitconfig:/root/.gitconfig:ro
    environment:
      BRANCH: ${BRANCH:-main}
      REPO_URL: ${REPO_URL:-git@github.com:tinpott/dotfiles.git}
